<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#f5f3ee">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="艺术卡片">
<title>艺术卡片</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<script>
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
</script>
<style>
:root{
  --bg:#f5f3ee; --card:#ffffff; --card2:#ecebe5; --txt:#1d1d22; --sub:#71717c;
  --line:#e7e4dc; --like:#d24a5b; --pass:#9a9aa5; --acc:#9a7c38;
  color-scheme: light;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Noto Sans SC",sans-serif;overflow:hidden;user-select:none;-webkit-user-select:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}

/* 布局 */
#app{height:100dvh;display:flex;flex-direction:column}
header{display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top,0px) + 10px) 16px 6px;gap:8px}
.hleft{display:flex;gap:8px}
header .hbtn{font-size:14px;color:var(--sub);padding:6px 10px;border-radius:10px;background:var(--card);white-space:nowrap}
header .hbtn b{color:var(--like)}
#btnHonor b{color:var(--acc)}
#roundLabel{font-size:13px;color:var(--acc);font-weight:600;letter-spacing:.04em;text-align:center;flex:1}
#roundLabel small{color:var(--sub);font-weight:400;margin-left:4px}
/* 闯关进度条 */
#modebar{display:flex;gap:7px;padding:5px 16px 3px;justify-content:center}
.mseg{font-size:12px;color:var(--sub);background:var(--card2);border:none;border-radius:14px;padding:5px 18px;transition:all .15s;cursor:pointer}
.mseg.on{background:var(--acc);color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(154,124,56,.3)}
#pbar{height:5px;margin:2px 16px 2px;background:var(--card2);border-radius:3px;overflow:hidden}
#pfill{display:block;height:100%;width:0;border-radius:3px;background:linear-gradient(90deg,var(--acc),#c8a24e);transition:width .3s ease}
#stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;min-height:0}
footer{display:flex;justify-content:center;gap:26px;padding:10px 0 calc(env(safe-area-inset-bottom,0px) + 14px)}
.abtn{width:58px;height:58px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 3px 12px rgba(40,35,20,.12);transition:transform .12s}
.abtn:active{transform:scale(.9)}
#btnPass{color:var(--pass)} #btnLike{color:var(--like)} #btnUndo{width:44px;height:44px;font-size:17px;align-self:center;color:var(--sub)}
#btnPerson{position:relative}
#btnPerson.unlocked{color:var(--acc)}
#btnPerson.unlocked::after{content:"";position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;background:var(--acc)}

/* 卡片 */
.card{position:absolute;width:min(92vw,430px);height:min(100%,740px);max-height:100%;background:var(--card);border-radius:22px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 10px 34px rgba(40,35,20,.16);touch-action:none;will-change:transform}
.card.back{transform:scale(.94) translateY(14px);filter:brightness(.96);opacity:.7;pointer-events:none}
.imgbox{flex:1;min-height:0;position:relative;background:var(--card2)}
.img{position:absolute;inset:0;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.img .ph{font-size:26px;line-height:1.5;font-weight:600;color:rgba(40,35,25,.72);font-family:"Songti SC","SimSun",serif;position:relative;padding:22px 26px}
.img .ph small{display:block;font-size:14px;font-weight:400;margin-top:12px;color:rgba(40,35,25,.5);font-family:system-ui,sans-serif}
.img .ph::before,.img .ph::after{content:"";position:absolute;width:20px;height:20px;border:1.5px solid rgba(120,90,40,.32)}
.img .ph::before{left:-2px;top:-2px;border-right:0;border-bottom:0}
.img .ph::after{right:-2px;bottom:-2px;border-left:0;border-top:0}
/* 诗卡:诗句本身即卡面 */
.img.verse{background:linear-gradient(160deg,#faf6ec,#ece0cb);padding:20px;flex-direction:column;gap:14px}
.verse .vseal{position:absolute;top:14px;right:16px;font-size:13px;color:#b2622e;border:1.5px solid #b2622e;border-radius:5px;padding:3px 5px;font-family:"Songti SC",serif;letter-spacing:2px;writing-mode:vertical-rl;opacity:.8}
.verse .vtext{font-family:"Songti SC","SimSun","Kaiti SC",serif;color:#2b2419;font-size:23px;line-height:2;letter-spacing:2px;text-align:center;max-height:78%;overflow:hidden;text-shadow:0 1px 0 rgba(255,255,255,.4)}
.verse .vtext.long{font-size:18px;line-height:1.85}
.verse .vsig{font-family:"Songti SC",serif;font-size:14px;color:#6a5a3e;letter-spacing:1px}
.dots{position:absolute;top:10px;left:0;right:0;display:flex;gap:5px;justify-content:center;z-index:2}
.dots i{width:22px;height:3px;border-radius:2px;background:rgba(255,255,255,.28)}
.dots i.on{background:rgba(255,255,255,.9)}
.tapL,.tapR{position:absolute;top:0;bottom:0;width:34%;z-index:1}
.tapL{left:0}.tapR{right:0}
.cred{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:4px 74px 5px 10px;font-size:10px;line-height:1.3;color:rgba(255,255,255,.82);background:linear-gradient(transparent,rgba(0,0,0,.42));text-align:right;pointer-events:none}
.cred:empty{display:none}
.cpr{position:absolute;left:8px;bottom:7px;z-index:3;display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:11px;font-size:10px;font-weight:600;color:#fff;pointer-events:none}
.cpr::before{content:"";width:7px;height:7px;border-radius:50%;background:#fff}
.cpr.ok{background:rgba(28,120,60,.82)}
.cpr.no{background:rgba(178,44,44,.82)}
.cpr.own{background:rgba(84,84,96,.82)}
.portflag{position:absolute;top:10px;left:10px;z-index:3;padding:4px 9px;border-radius:11px;font-size:10px;font-weight:600;color:#fff;background:rgba(178,98,46,.9);pointer-events:none;max-width:70%}
.cpr:empty{display:none}
#dCredit{font-size:12px;color:var(--sub);line-height:1.6;margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
#dCredit:empty{display:none}
.badge{position:absolute;top:22px;font-size:17px;font-weight:700;letter-spacing:.12em;padding:7px 14px;border-radius:8px;border:2.5px solid;opacity:0;z-index:3;transform:rotate(-8deg)}
.badge.like{left:18px;color:#3f9e63;border-color:#3f9e63}
.badge.pass{right:18px;color:var(--like);border-color:var(--like);transform:rotate(8deg)}
.badge.fav{left:50%;top:auto;bottom:26%;transform:translateX(-50%) rotate(-4deg);color:#c8992e;border-color:#c8992e;background:rgba(255,250,235,.9);font-size:20px;box-shadow:0 4px 16px rgba(200,150,40,.35)}
.badge.skip{left:50%;top:20%;transform:translateX(-50%) rotate(-3deg);color:#6b7280;border-color:#6b7280;background:rgba(248,248,248,.9)}
.info{padding:14px 18px 16px;background:var(--card);border-top:1px solid var(--line)}
.info h2{font-size:18px;line-height:1.35}
.info .meta{font-size:13px;color:var(--acc);margin:3px 0 8px}
.info .line{font-size:13px;line-height:1.55;color:var(--sub);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px}
.info .line b{color:var(--txt);font-weight:600;margin-right:6px}
/* 书籍卡:三句话总结(替代 背景/方式/意义) */
.info .sum3{margin:2px 0 0}
.info .sum3 p{font-size:13px;line-height:1.5;color:var(--sub);margin:6px 0;padding-left:20px;position:relative;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.info .sum3 p:before{position:absolute;left:0;top:1px;color:var(--acc);font-weight:700;font-size:12px}
.info .sum3 p:nth-child(1):before{content:"①"}
.info .sum3 p:nth-child(2):before{content:"②"}
.info .sum3 p:nth-child(3):before{content:"③"}
.info .hint{margin-top:8px;font-size:clamp(8px,2.5vw,12px);color:#6c6c78;text-align:center;white-space:nowrap;overflow:hidden}
/* 详情页·书籍模式:隐藏 背景/方式/意义 标签,三句话编号呈现 */
.dwrap.bookmode .dlbl{display:none}
.dwrap.bookmode section{margin-bottom:11px}
.dwrap.bookmode #dBg,.dwrap.bookmode #dHow,.dwrap.bookmode #dWhy{padding-left:26px;position:relative}
.dwrap.bookmode #dBg:before,.dwrap.bookmode #dHow:before,.dwrap.bookmode #dWhy:before{position:absolute;left:0;top:2px;color:var(--acc);font-weight:700}
.dwrap.bookmode #dBg:before{content:"①"}
.dwrap.bookmode #dHow:before{content:"②"}
.dwrap.bookmode #dWhy:before{content:"③"}
.dbookhead{font-size:13px;color:var(--sub);letter-spacing:.15em;margin-bottom:10px}
.dwrap:not(.bookmode) .dbookhead{display:none}
.card.flyL{transition:transform .35s ease-in;transform:translate(-120vw,-6vh) rotate(-22deg)!important}
.card.flyR{transition:transform .35s ease-in;transform:translate(120vw,-6vh) rotate(22deg)!important}
.card.flyU{transition:transform .5s ease-in;transform:translateY(-125vh) scale(.9)!important}
.card.flyD{transition:transform .38s ease-in;transform:translateY(125vh) scale(.95)!important}
.card.spring{transition:transform .25s}
/* 爆灯:金色星芒迸发 */
.burst{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:96px;z-index:4;pointer-events:none;animation:burst .55s ease-out forwards}
.burst::after{content:"";position:absolute;width:40px;height:40px;border-radius:50%;box-shadow:0 0 0 0 rgba(230,180,60,.75);animation:burstRing .55s ease-out forwards}
@keyframes burst{0%{transform:scale(.2);opacity:0}30%{transform:scale(1.15);opacity:1}100%{transform:scale(1.5);opacity:0}}
@keyframes burstRing{0%{box-shadow:0 0 0 0 rgba(230,180,60,.7)}100%{box-shadow:0 0 0 240px rgba(230,180,60,0)}}
#btnFav{color:#c8992e}
#btnFav:active{transform:scale(.86)}

/* 提示 */
#toast{position:fixed;left:50%;bottom:104px;transform:translateX(-50%);background:rgba(35,32,26,.92);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .35s;z-index:40;max-width:82vw;text-align:center}
#toast.show{opacity:1}
/* 空状态 */
#empty{text-align:center;color:var(--sub);padding:0 30px;line-height:2}
#empty h2{color:var(--txt);margin-bottom:6px}
#empty button{color:var(--acc);text-decoration:underline}

/* 通关庆祝 */
#victory{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;background:radial-gradient(120% 90% at 50% 30%,#fbf7ee,#efe9dc)}
#victory.show{display:flex;animation:vfade .4s}
@keyframes vfade{from{opacity:0}to{opacity:1}}
#victory .medal{font-size:82px;line-height:1;animation:vpop .5s cubic-bezier(.2,1.3,.4,1)}
@keyframes vpop{0%{transform:scale(0) rotate(-30deg)}100%{transform:scale(1) rotate(0)}}
#victory .vlvl{margin-top:14px;font-size:14px;color:var(--sub);letter-spacing:.14em}
#victory .vboss{margin-top:6px;font-size:26px;font-weight:700;color:var(--txt)}
#victory .vboss span{color:var(--acc)}
#victory .vsub{margin-top:10px;font-size:14px;color:var(--sub);line-height:1.7;max-width:300px}
#victory .vbig{margin-top:20px;padding:14px 22px;border:1.5px solid var(--acc);border-radius:16px;background:rgba(154,124,56,.08);animation:vfade .6s .3s both}
#victory .vbig .t{font-size:12px;color:var(--acc);letter-spacing:.24em}
#victory .vbig .r{font-size:24px;font-weight:800;color:var(--acc);margin-top:6px;letter-spacing:.1em}
#victory .vnext{margin-top:30px;padding:14px 40px;border-radius:26px;background:var(--acc);color:#fff;font-size:16px;font-weight:600;box-shadow:0 6px 18px rgba(154,124,56,.3)}
#victory .vskip{margin-top:14px;font-size:13px;color:var(--sub)}
/* 荣誉墙 */
#honorWall{padding:20px 20px 40px;max-width:640px;margin:0 auto;width:100%}
.hstat{display:flex;gap:12px;margin-bottom:22px}
.hstat .box{flex:1;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;text-align:center}
.hstat .box .n{font-size:26px;font-weight:800;color:var(--acc)}
.hstat .box .l{font-size:12px;color:var(--sub);margin-top:4px;letter-spacing:.08em}
.hstat .box.rank .n{font-size:22px}
#medalGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:10px}
.mcell{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 6px;text-align:center}
.mcell.big{border-color:var(--acc);background:rgba(154,124,56,.07)}
.mcell .e{font-size:22px}
.mcell .lv{font-size:11px;color:var(--sub);margin-top:4px}
.mcell .bn{font-size:12px;color:var(--txt);margin-top:2px}
.mcell.big .bn{color:var(--acc);font-weight:700}
#honorWall .muted{color:var(--sub);text-align:center;padding:30px}
/* 个人 */
.ptabs{display:flex;gap:8px;padding:14px 18px 0;max-width:640px;margin:0 auto;width:100%}
.ptab{flex:1;padding:10px;border-radius:12px;background:var(--card);color:var(--sub);font-size:14px;border:1px solid var(--line)}
.ptab.on{background:var(--acc);color:#fff;font-weight:600;border-color:var(--acc)}
.ptabbody{padding:16px 20px 44px;max-width:640px;margin:0 auto;width:100%}
.pfield{display:flex;justify-content:space-between;align-items:center;padding:13px 2px;border-bottom:1px solid var(--line);font-size:15px}
.pfield .k{color:var(--sub)}
.pfield .v{color:var(--txt);font-weight:600}
.pedit{color:var(--acc);font-size:13px;margin-left:8px;cursor:pointer}
.pdanger{margin-top:44px;padding-top:16px;border-top:1px dashed var(--line);text-align:center}
.pdanger button{color:#b23b3b;font-size:12px;opacity:.55}
.asig{font-size:16px;line-height:1.8;color:var(--txt);font-weight:600;background:linear-gradient(120deg,#faf6ec,#efe6d4);padding:16px 18px;border-radius:14px;margin-bottom:24px}
.asec{margin-bottom:26px}
.asec .at{font-size:12px;color:var(--acc);letter-spacing:.24em;margin-bottom:12px}
.abar{margin-bottom:11px}
.abar .row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px}
.abar .row b{font-weight:600;color:var(--txt)}
.abar .row span{color:var(--sub);font-size:12px}
.abar .track{height:7px;background:var(--card2);border-radius:4px;overflow:hidden}
.abar .track i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),#c8a24e);border-radius:4px}
.aq{font-size:16px;line-height:1.85;color:var(--txt);background:var(--card);border-left:3px solid var(--acc);padding:14px 16px;border-radius:0 12px 12px 0}
.atags{display:flex;flex-wrap:wrap;gap:8px}
.atag{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:8px 14px;font-size:14px}
.atag b{color:var(--acc);margin-left:4px}
.anote{margin-top:22px;font-size:12px;color:var(--sub);line-height:1.8;text-align:center}
.alock{text-align:center;padding:54px 24px;color:var(--sub);line-height:1.95}
.alock .ico{font-size:46px}
.alock h4{color:var(--txt);font-size:17px;margin:14px 0 8px}
/* 覆盖层 */
.overlay{position:fixed;inset:0;background:var(--bg);z-index:20;display:none;flex-direction:column;overflow:hidden}
.overlay.show{display:flex}
.obar{display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top,0px) + 10px) 16px 10px;border-bottom:1px solid var(--line);flex:none}
.obar h3{font-size:16px}
.obar .close{font-size:22px;color:var(--sub);padding:4px 10px}
.obody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:40px}
/* 详情 */
#dImg{position:relative;width:100%;height:min(48vh,420px);background:var(--card2) center/contain no-repeat;display:flex;align-items:center;justify-content:center}
#dImg .ph{font-size:22px;color:rgba(40,35,25,.65);font-weight:600;text-align:center;padding:20px}
.dcpr{position:absolute;left:12px;bottom:12px;display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;color:#fff}
.dcpr::before{content:"";width:8px;height:8px;border-radius:50%;background:#fff}
.dcpr.ok{background:rgba(28,120,60,.9)} .dcpr.no{background:rgba(178,44,44,.9)} .dcpr.own{background:rgba(84,84,96,.9)}
.uprow{display:flex;align-items:center;gap:10px;margin-top:20px;flex-wrap:wrap}
.upbtn{display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:12px;background:var(--card2);color:var(--txt);font-size:14px;font-weight:600;cursor:pointer}
.upbtn:active{opacity:.7}
.uprm{padding:9px 13px;border-radius:12px;background:transparent;border:1px solid var(--line);color:var(--sub);font-size:13px}
.uptip{font-size:11px;color:var(--sub)}
#dVideo{width:100%;background:#000}
#dVideo.vsearch{background:none;padding:12px 20px 0;max-width:640px;margin:0 auto}
#dVideo[hidden]{display:none}
#dVideo iframe,#dVideo video{display:block;width:100%;aspect-ratio:16/9;border:0}
.ytbtn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:14px;background:var(--card);border:1px solid var(--line);color:var(--txt);font-size:15px;font-weight:600;text-decoration:none}
.ytbtn:active{background:var(--card2)}
.dwrap{padding:20px 22px;max-width:640px;margin:0 auto}
.dwrap h2{font-size:22px;line-height:1.4}
.dwrap .meta{color:var(--acc);font-size:14px;margin:6px 0 18px}
.dwrap section{margin-bottom:16px}
.dwrap section h4{font-size:13px;color:var(--sub);letter-spacing:.2em;margin-bottom:5px}
.dwrap section p{font-size:15px;line-height:1.8}
.mlinks{margin-top:8px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.mbtn{display:inline-flex;align-items:center;padding:11px 18px;border-radius:14px;font-size:15px;font-weight:600;color:#fff;background:#c62f2f}
.mbtn.qq{background:#1c8f3e}
.mbtn:active{opacity:.8}
.playbtn.small{background:transparent;color:var(--sub);font-size:13px;font-weight:400;padding:6px 0;margin-top:6px}
.dwrap .links{margin-top:22px;display:flex;gap:14px;flex-wrap:wrap}
.dwrap .links a{color:var(--acc);font-size:14px;text-decoration:none;border-bottom:1px solid var(--acc)}
#dAudio{margin:10px 0 4px}
#dAudio .playbtn{background:var(--card);border:1px solid var(--line);padding:10px 18px;border-radius:12px;font-size:15px;color:var(--txt)}
#dAudio .tk{font-size:13px;color:var(--sub);margin-top:8px}
#dAudio audio{width:100%;margin-top:10px}
.reprow{margin-top:18px}
.repbtn{font-size:13px;color:var(--sub);background:none;border:1px dashed var(--sub);border-radius:12px;padding:7px 14px;opacity:.8}
#repPanel{margin-top:10px;background:var(--card);border-radius:14px;padding:10px;display:flex;flex-wrap:wrap;gap:8px}
#repPanel button{font-size:13px;padding:8px 12px;border-radius:10px;background:var(--card2)}
.repfoot{width:100%;display:flex;gap:16px;align-items:center;font-size:12px;color:var(--sub);margin-top:4px}
.repfoot a{color:var(--acc)}
.dActs{display:flex;gap:14px;margin-top:26px}
.dActs button{flex:1;padding:13px;border-radius:14px;font-size:16px;background:var(--card)}
.dActs .dl{color:var(--like)}
/* 库 */
#libBody{padding:14px 18px;max-width:640px;margin:0 auto;width:100%}
.grp{margin-bottom:22px}
.grp h4{font-size:13px;color:var(--acc);letter-spacing:.25em;margin-bottom:8px}
.grp.fav{background:rgba(200,153,46,.06);border:1px solid rgba(200,153,46,.25);border-radius:14px;padding:10px 12px;margin-bottom:20px}
.grp.fav h4{color:#c8992e}
.grp .item{display:flex;justify-content:space-between;align-items:center;padding:11px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.grp .item .tt{font-size:15px}

<script>
/* 防缓存:按小时刷新 data.js,保证改动能被用户看到,又不至于每次都重下 */
document.write('<scr'+'ipt src="data.js?v='+Math.floor(Date.now()/3600000)+'"><\/scr'+'ipt>');
</script>
<script>
/* ============ 状态 ============ */
let MODE = localStorage.getItem('ac_mode')||'all';   // 'all'综合 | 'visual'视觉专业
function inMode(w){ return MODE==='visual' ? (w.kind==='art' && w.cat!=='美育案例') : true; }
const _sfx = ()=> MODE==='visual' ? '_v' : '';       // 综合版沿用原键(兼容老进度),专业版独立
let LSJ='ac_judged'+_sfx(), LSL='ac_lib'+_sfx(), LSR='ac_rounds'+_sfx();
const LSI='ac_imgcache2';
// 闯关:每轮击败一个心魔(小 boss),每 5 关晋升一重境界(大荣誉)
const BOSSES=['从众','猎奇','眼疲','偏食','附庸','速朽','麻木','成见','喜新','怀旧'];
const RANKS=['入境','会心','独造','观道','化境','通神','入神','天工'];
const BMEDAL=['🎖️','🏵️','⚔️','🛡️','🗡️','🎯','🔥','🌀','💠','🧿'];
let rounds = +(localStorage.getItem(LSR)||0);            // 已通关轮数
let roundTotal = 0;
const saveR = ()=>localStorage.setItem(LSR, rounds);
let LSS='ac_seen'+_sfx(); const LSN='ac_name';
let seen = +(localStorage.getItem(LSS)||0);              // 累计刷过张数
const saveS = ()=>localStorage.setItem(LSS, seen);
const bossOf = n => BOSSES[(n-1)%BOSSES.length];
const medalOf = n => BMEDAL[(n-1)%BMEDAL.length];
const rankOf  = k => k<=RANKS.length ? RANKS[k-1]
  : RANKS[(k-1)%RANKS.length]+'·'+(Math.floor((k-1)/RANKS.length)+1)+'周目';
const curRank = ()=> rounds>=5 ? rankOf(Math.floor(rounds/5)) : '初学乍练';
let judged = JSON.parse(localStorage.getItem(LSJ)||'{}');   // 本轮判断 id -> 'like'|'pass'
// 库(永久):没存过则从旧版 judged 里迁移喜欢的
let lib = new Set(JSON.parse(localStorage.getItem(LSL)||'null') ||
  Object.keys(judged).filter(k=>judged[k]==='like').map(Number));
let imgCache = JSON.parse(localStorage.getItem(LSI)||'{}'); // wikiTitle -> url|''
let LSFAV='ac_favs'+_sfx();
let favs = new Set(JSON.parse(localStorage.getItem(LSFAV)||'[]')); // 爆灯:比喜欢更喜欢
let LSPASS='ac_passed'+_sfx();
let passed = new Set(JSON.parse(localStorage.getItem(LSPASS)||'[]')); // 没意思(永久排除,不再出现,也不入库)
const saveP = ()=>localStorage.setItem(LSPASS, JSON.stringify([...passed]));
let deck = [];           // 待刷的 work 引用队列
let undoStack = [];      // {id, r}
const byId = {}; WORKS.forEach(w=>{ byId[w.id]=w; w._imgs=[]; w._idx=0; });

/* ===== 本地上传图片:存 IndexedDB(在本机,私密,不上传公网)===== */
let userImgs = {};   // id -> dataURL
const IDB = (()=>{
  let dbp;
  const open = ()=> dbp || (dbp = new Promise((res,rej)=>{
    const r = indexedDB.open('artcards', 1);
    r.onupgradeneeded = ()=> r.result.createObjectStore('imgs');
    r.onsuccess = ()=> res(r.result); r.onerror = ()=> rej(r.error);
  }));
  return {
    async all(){ const d=await open(); return new Promise(res=>{ const out={}, cur=d.transaction('imgs').objectStore('imgs').openCursor();
      cur.onsuccess=e=>{ const c=e.target.result; if(c){ out[c.key]=c.value; c.continue(); } else res(out); }; cur.onerror=()=>res(out); }); },
    async put(id,val){ const d=await open(); return new Promise((res,rej)=>{ const tx=d.transaction('imgs','readwrite'); tx.objectStore('imgs').put(val,String(id)); tx.oncomplete=res; tx.onerror=()=>rej(tx.error); }); },
    async del(id){ const d=await open(); return new Promise(res=>{ const tx=d.transaction('imgs','readwrite'); tx.objectStore('imgs').delete(String(id)); tx.oncomplete=res; tx.onerror=res; }); }
  };
})();
function isUserImg(u){ return typeof u==='string' && u.startsWith('data:'); }
// 把选的图压到 ≤1280、存本机,并即时替换当前作品主图
function fileToImg(file, w){
  const rd=new FileReader();
  rd.onload=()=>{ const im=new Image(); im.onload=()=>{
    const max=1280, sc=Math.min(1, max/Math.max(im.width,im.height));
    const cv=document.createElement('canvas'); cv.width=Math.round(im.width*sc); cv.height=Math.round(im.height*sc);
    cv.getContext('2d').drawImage(im,0,0,cv.width,cv.height);
    const data=cv.toDataURL('image/jpeg',0.86);
    userImgs[w.id]=data;
    IDB.put(w.id,data).catch(()=>alert('保存失败,可能空间不足'));
    w._imgs=w._imgs.filter(u=>!isUserImg(u)); w._imgs.unshift(data); w._idx=0; w._loaded=true;
    if(dWork===w) setDImg(w), syncUpRow(w);
    const top=stage.querySelector('.card:not(.back)'); if(top) render();
  }; im.src=rd.result; };
  rd.readAsDataURL(file);
}
function removeUserImg(w){
  delete userImgs[w.id]; IDB.del(w.id);
  w._imgs=w._imgs.filter(u=>!isUserImg(u)); w._idx=0; w._loaded=false;
  if(dWork===w){ loadImgs(w,()=>{ if(dWork===w) setDImg(w); }); setDImg(w); syncUpRow(w); }
  render();
}
function syncUpRow(w){
  const rm=document.getElementById('upRm'); if(rm) rm.hidden = !userImgs[w.id];
}
const saveJ = ()=>localStorage.setItem(LSJ, JSON.stringify(judged));
const saveI = ()=>localStorage.setItem(LSI, JSON.stringify(imgCache));
const saveL = ()=>localStorage.setItem(LSL, JSON.stringify([...lib]));
const saveF = ()=>localStorage.setItem(LSFAV, JSON.stringify([...favs]));

/* ============ 牌堆:每关 200 张,打乱 + 避免同类连续 ============ */
const ROUND_SIZE = 200;
function buildDeck(){
  let pool = WORKS.filter(w=>inMode(w) && !judged[w.id] && !lib.has(w.id) && !passed.has(w.id)); // 入库的、已排除的、本关已判的都不再发
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  for(let i=1;i<pool.length;i++){
    if(pool[i].cat===pool[i-1].cat){
      const k = pool.findIndex((w,x)=>x>i && w.cat!==pool[i-1].cat);
      if(k>-1) [pool[i],pool[k]]=[pool[k],pool[i]];
    }
  }
  const done = Object.keys(judged).length;               // 本关已判张数
  roundTotal = Math.min(ROUND_SIZE, pool.length + done);  // 本关目标 ≤200
  deck = pool.slice(0, Math.max(0, roundTotal - done));   // 只发够本关剩余的
}

/* ============ 配图:维基百科摘要接口,带缓存 ============ */
function fetchImg(title){
  if(title in imgCache) return Promise.resolve(imgCache[title]);
  return fetch('https://en.wikipedia.org/api/rest_v1/page/summary/'+encodeURIComponent(title))
    .then(r=>r.ok?r.json():null)
    .then(j=>{
      let u='';
      if(j){
        const ow = j.originalimage ? j.originalimage.width : 0;
        if(ow && ow<=1400) u=j.originalimage.source;               // 原图不大,直接用
        else if(ow && j.thumbnail) u=j.thumbnail.source.replace(/\/(\d+)px-/, '/1000px-'); // 大图取 1000px 缩略
        else if(j.thumbnail) u=j.thumbnail.source;
        else if(j.originalimage) u=j.originalimage.source;
      }
      if(u){ imgCache[title]=u; saveI(); return u; }
      return fetchPageImg(title);  // REST 摘要无图(或条目被重定向) → pageimages 兜底
    }).catch(()=> fetchPageImg(title));
}
// 兜底:MediaWiki pageimages 接口,覆盖面远大于 REST 摘要,且 redirects=1 能跟条目重定向
function fetchPageImg(title){
  const api='https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&redirects=1'
    +'&prop=pageimages&piprop=original|thumbnail&pithumbsize=1000&titles='+encodeURIComponent(title);
  return fetch(api).then(r=>r.ok?r.json():null).then(j=>{
    let u='';
    if(j && j.query && j.query.pages){
      for(const p of Object.values(j.query.pages)){
        const s=(p.original&&p.original.source)||(p.thumbnail&&p.thumbnail.source);
        if(s){ u=s; break; }
      }
    }
    if(u){ imgCache[title]=u; saveI(); return u; }
    return fetchMediaList(title);  // pageimages 仍无 → 取条目正文首图
  }).catch(()=> fetchMediaList(title));
}
// 最后兜底:REST media-list 列出条目正文全部图片,取第一张(含 logo/作品照片,覆盖面最广)
function fetchMediaList(title){
  return fetch('https://en.wikipedia.org/api/rest_v1/page/media-list/'+encodeURIComponent(title))
    .then(r=>r.ok?r.json():null).then(j=>{
      let u='';
      if(j && j.items){
        const im=j.items.find(m=>m.type==='image' && m.srcset && m.srcset.length);
        if(im){ u=im.srcset[0].src; if(u.indexOf('//')===0) u='https:'+u; }
      }
      // 用作品最本身的最佳图(第一印象最关键),版权状态由左下角红/绿标注明
      imgCache[title]=u; saveI(); return u;
    }).catch(()=>{ imgCache[title]=''; return ''; });
}
// 音乐作品:用 iTunes 专辑封面(作品本身),而非艺术家照片
function fetchMusicArt(w){
  const key='itart:'+(w.q||w.a+' '+w.t);
  if(key in imgCache) return Promise.resolve(imgCache[key]);
  return new Promise(res=>{
    const cb='itart'+Date.now()+Math.floor(Math.random()*1e4); let done=false;
    const fin=u=>{ if(done)return; done=true; try{delete window[cb]; s.remove();}catch(_){}; imgCache[key]=u; saveI(); res(u); };
    window[cb]=data=>{ const rs=(data&&data.results)||[]; const tr=rs.find(r=>r.artworkUrl100)||rs[0];
      fin(tr&&tr.artworkUrl100 ? tr.artworkUrl100.replace('100x100','600x600') : ''); };
    const s=document.createElement('script');
    s.src=`https://itunes.apple.com/search?term=${encodeURIComponent(w.q||w.a+' '+w.t)}&media=music&entity=album&limit=5&callback=${cb}`;
    s.onerror=()=>fin(''); document.body.appendChild(s);
    setTimeout(()=>fin(''), 8000);
  });
}
function loadImgs(w, onUpdate){
  if(w._loaded) { onUpdate&&onUpdate(); return; }
  w._loaded = true;
  // 0) 本机上传图最优先
  const uimg = userImgs[w.id];
  if(uimg && !w._imgs.includes(uimg)){ w._imgs.unshift(uimg); onUpdate&&onUpdate(); }
  // 音乐:优先专辑封面(作品本身),艺术家照片退居其后
  if(w.kind==='music'){
    fetchMusicArt(w).then(u=>{ if(!u || w._imgs.includes(u)) return;
      const im=new Image(); im.onload=()=>{ if(!w._imgs.includes(u)){ w._imgs.splice(uimg?1:0,0,u); w._idx=0; onUpdate&&onUpdate(); } }; im.src=u; });
  }
  // 1) 固化图:可靠、秒出,不依赖实时抓取(有本机图则排其后)
  if(w.img){
    const im=new Image();
    im.onload=()=>{ if(!w._imgs.includes(w.img)){ uimg? w._imgs.push(w.img) : w._imgs.unshift(w.img); onUpdate&&onUpdate(); } };
    im.onerror=fetchWiki;               // 固化图失效才回退维基
    im.src=w.img;
    onUpdate&&onUpdate();
    return;
  }
  fetchWiki();
  function fetchWiki(){
    if(!w.wiki || w.nwi) { onUpdate&&onUpdate(); return; }  // nwi=维基只剩作者传记页,禁取图(避免作者肖像冒充作品)
    w.wiki.forEach(t=>fetchImg(t).then(u=>{
      if(!u || w._imgs.includes(u)) return;
      const im=new Image();             // 预加载成功才上卡片,避免黑图
      im.onload=()=>{ if(!w._imgs.includes(u)){ w._imgs.push(u); onUpdate&&onUpdate(); } };
      im.src=u;
    }));
  }
}

/* ============ 占位封面 ============ */
function hue(s){ let h=0; for(const c of s) h=(h*31+c.charCodeAt(0))%360; return h; }
function phStyle(w){ const h=hue(w.t); return `background-image:linear-gradient(160deg,hsl(${h},42%,88%),hsl(${(h+50)%360},36%,74%))`; }

/* ============ 渲染卡片 ============ */
const stage = document.getElementById('stage');
function isPoem(w){ return w.kind==='poem' || !!w.verse; }
function verseHTML(w){
  const lines=(w.verse||'').split('\n').filter(x=>x.trim());
  const long = lines.length>6 || lines.some(l=>l.length>16);
  return `<div class="vseal">诗</div>
    <div class="vtext${long?' long':''}">${lines.join('<br>')}</div>
    <div class="vsig">— ${w.a}《${w.t}》</div>`;
}
// 书籍卡:三句话总结(无 背景/方式/意义 标签);其余门类保留原标签
function linesHTML(w){
  if(w.kind==='book'){
    return `<div class="sum3"><p>${w.bg}</p><p>${w.how}</p><p>${w.why}</p></div>`;
  }
  return `<p class="line"><b>背景</b>${w.bg}</p>
      <p class="line"><b>方式</b>${w.how}</p>
      <p class="line"><b>意义</b>${w.why}</p>`;
}
function cardEl(w, isTop){
  const el = document.createElement('article');
  el.className = 'card'+(isTop?'':' back');
  const face = isPoem(w)
    ? `<div class="img verse">${verseHTML(w)}</div>`
    : `<div class="img" style="${phStyle(w)}"><div class="ph">《${w.t}》<small>${w.a} · ${w.y}</small></div></div>`;
  el.innerHTML = `
    <div class="imgbox">
      ${face}
      <div class="dots"></div>
      <div class="cred"></div>
      <div class="cpr"></div>
      ${w.port?'<div class="portflag">⚠ 此图是艺术家肖像 · 待换作品图</div>':''}
      <div class="tapL"></div><div class="tapR"></div>
      <span class="badge like">有意思</span><span class="badge pass">没意思</span><span class="badge fav">爆灯 💡</span><span class="badge skip">跳过 ↓</span>
    </div>
    <div class="info">
      <h2>《${w.t}》</h2>
      <div class="meta">${w.a} · ${w.y}</div>
      ${linesHTML(w)}
      <div class="hint">点看详情 · 左滑没意思 / 右滑有意思 · 下滑跳过 · 上滑或双击 💡爆灯</div>
    </div>`;
  if(!isPoem(w)){ const refresh = ()=>updateImg(el, w); loadImgs(w, refresh); refresh(); }
  return el;
}
function isFreeImg(url){ return !!url && (url.indexOf('/wikipedia/commons/')>=0 || url.indexOf('imgs/')===0); } // Commons=自由授权,其余=有版权
function updateImg(el, w){
  const img = el.querySelector('.img'), dots = el.querySelector('.dots'), cred = el.querySelector('.cred'), cpr = el.querySelector('.cpr');
  if(w._imgs.length){
    w._idx = Math.min(w._idx, w._imgs.length-1);
    const url = w._imgs[w._idx];
    img.style.backgroundImage = `url("${url}")`;
    img.querySelector('.ph').style.display='none';
    dots.innerHTML = w._imgs.length>1 ? w._imgs.map((_,i)=>`<i class="${i===w._idx?'on':''}"></i>`).join('') : '';

    const pf = el.querySelector('.portflag'); if(pf) pf.style.display = user ? 'none' : '';  // 换了自己的图就撤掉提示
  }
}
function render(){
  stage.querySelectorAll('.card').forEach(c=>c.remove());

    completeRound();   // 本轮刷完 → 通关庆祝,待用户点「进入下一关」再开新一轮
    return;
  }

/* ============ 手势:拖拽判断 + 点按 ============ */
function attachDrag(el, w){
  let x0=0,y0=0,dx=0,dy=0,down=false,moved=false;
  el.addEventListener('pointerdown', e=>{
    down=true; moved=false; x0=e.clientX; y0=e.clientY; dx=dy=0;
    el.classList.remove('spring');
    el.setPointerCapture(e.pointerId);
  });
  el.addEventListener('pointermove', e=>{
    if(!down) return;
    dx=e.clientX-x0; dy=e.clientY-y0;
    if(Math.abs(dx)>8||Math.abs(dy)>8) moved=true;
    if(!moved) return;
    const up = dy<0 && Math.abs(dy)>Math.abs(dx);   // 上滑意图 = 爆灯
    const dn = dy>0 && Math.abs(dy)>Math.abs(dx);   // 下滑意图 = 跳过
    el.style.transform=`translate(${dx}px,${dy*((up||dn)?0.9:0.25)}px) rotate(${dx*0.045}deg)`;
    el.querySelector('.badge.like').style.opacity = (up||dn)?0:Math.max(0, Math.min(1, dx/90));
    el.querySelector('.badge.pass').style.opacity = (up||dn)?0:Math.max(0, Math.min(1,-dx/90));
    el.querySelector('.badge.fav').style.opacity  = up?Math.max(0, Math.min(1, -dy/90 - Math.abs(dx)/120)):0;
    const sk=el.querySelector('.badge.skip'); if(sk) sk.style.opacity = dn?Math.max(0, Math.min(1, dy/90 - Math.abs(dx)/120)):0;
  });
  el.addEventListener('pointerup', e=>{
    if(!down) return; down=false;
    if(!moved){ handleTap(e, el, w); return; }
    if(dy<-95 && Math.abs(dy)>Math.abs(dx)) judge('fav');   // 上滑 = 爆灯
    else if(dy>95 && Math.abs(dy)>Math.abs(dx)) judge('skip'); // 下滑 = 跳过(不记录,下轮再现)
    else if(dx>100) judge('like');
    else if(dx<-100) judge('pass');
    else{ el.classList.add('spring'); el.style.transform=''; el.querySelectorAll('.badge').forEach(b=>b.style.opacity=0); }
  });
  el.addEventListener('pointercancel', ()=>{ down=false; el.classList.add('spring'); el.style.transform=''; el.querySelectorAll('.badge').forEach(b=>b.style.opacity=0); });
}
let _lastTap=0, _tapTimer=null;
function handleTap(e, el, w){
  const t = e.target;
  if(w._imgs.length>1 && (t.classList.contains('tapL')||t.classList.contains('tapR'))){
    w._idx = (w._idx + (t.classList.contains('tapR')?1:-1) + w._imgs.length) % w._imgs.length;
    updateImg(el, w); return;
  }
  const now=Date.now();
  if(now-_lastTap < 300){ clearTimeout(_tapTimer); _lastTap=0; judge('fav'); return; } // 双击 = 爆灯
  _lastTap=now;
  _tapTimer=setTimeout(()=>{ openDetail(w, true); }, 290);   // 单击稍等,确认不是双击才开详情
}
function burst(el){
  const b=document.createElement('div'); b.className='burst'; b.textContent='💡';
  el.querySelector('.imgbox').appendChild(b);
}
/* ============ 学习模式:间隔复习(独立于主刷卡流程) ============ */
let LSLEARN='ac_learn'+_sfx();
let learn={}; try{learn=JSON.parse(localStorage.getItem(LSLEARN)||'{}')}catch(_){}
let learnMode=false;
const LSTAGES=[3,7,30,90];  // 天
const saveLearn=()=>localStorage.setItem(LSLEARN,JSON.stringify(learn));
function learnSchedule(id,stage){
  if(learn[id] && stage<=(learn[id].stage||0) && learn[id].due>Date.now()) return;
  learn[id]={due:Date.now()+LSTAGES[Math.min(stage,3)]*864e5, stage:stage};
  saveLearn(); updLearnCount();
}
function learnDue(){
  const now=Date.now();
  return [...lib].filter(id=>learn[id] && learn[id].due<=now).map(id=>WORKS.find(w=>w.id===id)).filter(Boolean);
}
function updLearnCount(){ const el=document.getElementById('learnCount'); if(el) el.textContent=learnDue().length; }
function enterLearn(){
  const due=learnDue();
  if(!due.length){ toast('暂无到期复习卡——右滑喜欢的作品,3天后会回来考你'); return; }
  for(let i=due.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [due[i],due[j]]=[due[j],due[i]]; }
  learnMode=true; deck=due.slice(0,20);
  document.getElementById('roundLabel').textContent='🎓 复习 '+deck.length+' 张';
  render(); toast('学习模式:还记得它有意思在哪吗?右滑记得·左滑忘了');
}
function exitLearn(){
  learnMode=false;
  document.getElementById('roundLabel').textContent='第 '+(rounds+1)+' 关';
  buildDeck(); render();
  toast('复习完成!');
}
function learnJudge(r){
  const top=stage.querySelector('.card:not(.back)');
  const w=deck[0]; if(!w) return;
  const st=(learn[w.id]&&learn[w.id].stage)||0;
  if(r==='like'||r==='fav') learn[w.id]={due:Date.now()+LSTAGES[Math.min(st+1,3)]*864e5, stage:Math.min(st+1,3)};
  else if(r==='pass') learn[w.id]={due:Date.now()+864e5, stage:0};   // 忘了:明天再来
  else learn[w.id]={due:Date.now()+36e5, stage:st};                   // 跳过:1小时后
  saveLearn();
  const cls=r==='fav'?'flyU':(r==='like'?'flyR':(r==='pass'?'flyL':'flyD'));
  const fin=()=>{ deck.shift(); if(!deck.length){ updLearnCount(); exitLearn(); } else render(); };
  if(top){ top.classList.add(cls); setTimeout(fin,240); } else fin();
}
document.getElementById('btnLearn').onclick=()=>{ if(learnMode){ exitLearn(); } else enterLearn(); };
// 老库存回填:已喜欢但未排期的,错峰排入(0-3天)
setTimeout(()=>{ let n=0; [...lib].forEach(id=>{ if(!learn[id]){ learn[id]={due:Date.now()+Math.random()*3*864e5,stage:0}; n++; } }); if(n) saveLearn(); updLearnCount(); },800);

/* ============ 双模式:综合版 / 视觉专业版(进度各自独立) ============ */
function loadState(){
  const x=_sfx();
  LSJ='ac_judged'+x; LSL='ac_lib'+x; LSR='ac_rounds'+x; LSS='ac_seen'+x; LSFAV='ac_favs'+x; LSPASS='ac_passed'+x; LSLEARN='ac_learn'+x;
  judged=JSON.parse(localStorage.getItem(LSJ)||'{}');
  lib=new Set(JSON.parse(localStorage.getItem(LSL)||'[]'));
  favs=new Set(JSON.parse(localStorage.getItem(LSFAV)||'[]'));
  passed=new Set(JSON.parse(localStorage.getItem(LSPASS)||'[]'));
  rounds=+(localStorage.getItem(LSR)||0);
  seen=+(localStorage.getItem(LSS)||0);
  try{learn=JSON.parse(localStorage.getItem(LSLEARN)||'{}')}catch(_){learn={}}
}
function switchMode(m){
  if(m===MODE) return;
  MODE=m; localStorage.setItem('ac_mode',m);
  loadState();
  learnMode=false; if(typeof undoStack!=='undefined') undoStack.length=0;
  document.querySelectorAll('.mseg').forEach(b=>b.classList.toggle('on', b.dataset.mode===m));
  buildDeck(); render(); updLearnCount();
  toast(m==='visual'?'🎨 视觉专业版 · 只看纯视觉作品':'🌏 综合版');
}
document.querySelectorAll('.mseg').forEach(b=>{ b.classList.toggle('on', b.dataset.mode===MODE); b.onclick=()=>switchMode(b.dataset.mode); });

function judge(r){
  if(!deck.length) return;
  if(learnMode){ learnJudge(r); return; }
  const top = stage.querySelector('.card:not(.back)');
  if(top && (top.classList.contains('flyL')||top.classList.contains('flyR')||top.classList.contains('flyU')||top.classList.contains('flyD'))) return; // 卡片正在飞出,忽略重复判定
  const w = deck[0];
  if(r==='skip'){                                  // 跳过:不判、不入库、不排除,本轮往下、下轮会再出现
    undoStack.push({id:w.id, r:'skip'});
    if(top){ top.classList.add('flyD'); setTimeout(()=>{ deck.shift(); render(); }, 240); }
    else { deck.shift(); render(); }
    return;
  }
  judged[w.id]=r; saveJ();
  seen++; saveS();
  if(r==='like'||r==='fav'){ lib.add(w.id); saveL(); learnSchedule(w.id,0); }
  if(r==='pass'){ passed.add(w.id); saveP(); }   // 没意思:永久排除,以后不再出现
  if(r==='fav'){ favs.add(w.id); saveF(); if(top) burst(top); }
  undoStack.push({id:w.id, r});
  const cls = r==='fav'?'flyU':(r==='like'?'flyR':'flyL');
  const delay = r==='fav'?540:240;   // 爆灯多留一会儿看动画
  if(top){ top.classList.add(cls); setTimeout(()=>{ deck.shift(); render(); }, delay); }
  else { deck.shift(); render(); }
}
function undo(){
  const u = undoStack.pop();
  if(!u){ return; }
  if(u.r!=='skip'){                                // 跳过没记录任何状态,撤销时只需把卡放回
    delete judged[u.id]; saveJ();
    if(seen>0){ seen--; saveS(); }
    if(u.r==='like'||u.r==='fav'){ lib.delete(u.id); saveL(); }
    if(u.r==='pass'){ passed.delete(u.id); saveP(); }
    if(u.r==='fav'){ favs.delete(u.id); saveF(); }
  }
  deck.unshift(byId[u.id]); render();
}

/* ============ 音乐试听:iTunes 30 秒预览(JSONP) ============ */
function playPreview(w){
  const trackEl=document.getElementById('dTrack');
  // 固化直链:免搜索接口(国内常被墙),音频直接走苹果 CDN
  if(w.pv){
    trackEl.textContent=w.t+' — 30 秒试听';
    document.getElementById('dAudioBox').innerHTML=`<audio controls autoplay src="${w.pv}"></audio>`;
    return;
  }
  trackEl.textContent='搜索音源中…';
  const cb='itcb'+Date.now();
  let done=false;
  const fail=msg=>{ if(done) return; done=true; try{delete window[cb]; s.remove();}catch(_){}
    trackEl.innerHTML=(msg||'iTunes 试听源不通')+' — 用下面「网易云 / QQ音乐」听整首 ↓'; };
  window[cb]=data=>{
    if(done) return; done=true; try{delete window[cb]; s.remove();}catch(_){}
    const rs=(data.results||[]).filter(r=>r.previewUrl);
    const tr=rs.find(r=>!/remix|live|edit|karaoke|tribute|cover/i.test(r.trackName+' '+r.collectionName)) || rs[0];
    if(!tr){ trackEl.innerHTML='iTunes 没找到试听 — 用下面「网易云 / QQ音乐」听整首 ↓'; return; }
    trackEl.innerHTML=`${tr.trackName} — ${tr.artistName} · <a style="color:var(--acc)" href="${tr.trackViewUrl}" target="_blank">完整版 ↗</a>`;
    document.getElementById('dAudioBox').innerHTML=`<audio controls autoplay src="${tr.previewUrl}"></audio>`;
  };
  const s=document.createElement('script');
  s.src=`https://itunes.apple.com/search?term=${encodeURIComponent(w.q||w.a+' '+w.t)}&media=music&limit=8&callback=${cb}`;
  s.onerror=()=>fail('iTunes 试听源不通(国内常被墙)');
  document.body.appendChild(s);
  setTimeout(()=>fail('iTunes 试听超时(国内常被墙)'), 9000);   // 超时兜底
}

/* ============ 我的库 ============ */
function openLibrary(){
  const liked = WORKS.filter(w=>lib.has(w.id));
  const body = document.getElementById('libBody');
  if(!liked.length){ body.innerHTML='<div class="muted">还没有作品入库<br>右滑你觉得有意思的卡片</div>'; }
  else{
    const favW = liked.filter(w=>favs.has(w.id));
    const item = w=>`<div class="item" data-id="${w.id}">
        <div><div class="tt">${favs.has(w.id)?'💡 ':''}《${w.t}》</div><div class="aa">${w.a} · ${w.y}</div></div>
        <button class="rm" data-rm="${w.id}">✕</button></div>`;
    const cats=[...new Set(liked.map(w=>w.cat))];
    body.innerHTML = `<div id="libTools"><button id="btnExport">导出目录 (.md)</button></div>` +
      (favW.length ? `<div class="grp fav"><h4>💡 爆灯 · ${favW.length}</h4>${favW.map(item).join('')}</div>` : '') +
      cats.map(c=>`<div class="grp"><h4>${c} · ${liked.filter(w=>w.cat===c).length}</h4>`+
        liked.filter(w=>w.cat===c).map(item).join('')+`</div>`).join('');
    document.getElementById('btnExport').onclick=exportMd;
    body.querySelectorAll('.item').forEach(it=>it.addEventListener('click',e=>{
      const rm=e.target.getAttribute('data-rm');
      if(rm){ const id=Number(rm); lib.delete(id); favs.delete(id); saveL(); saveF(); delete judged[rm]; saveJ(); openLibrary(); render(); return; }
      openDetail(byId[it.dataset.id], false);
    }));
  }
  document.getElementById('library').classList.add('show');
}
function exportMd(){
  const liked = WORKS.filter(w=>lib.has(w.id));
  const cats=[...new Set(liked.map(w=>w.cat))];
  let md=`# 我的作品库\n\n> 导出于 ${new Date().toLocaleDateString('zh-CN')} · 共 ${liked.length} 件,其中爆灯 ${favs.size} 件\n`;
  cats.forEach(c=>{
    md+=`\n## ${c}\n\n`;
    liked.filter(w=>w.cat===c).forEach(w=>{
      md += `### ${favs.has(w.id)?'💡 ':''}《${w.t}》— ${w.a}(${w.y})\n`;
      md += w.kind==='book'
        ? `1. ${w.bg}\n2. ${w.how}\n3. ${w.why}\n\n`
        : `- 背景:${w.bg}\n- 方式:${w.how}\n- 意义:${w.why}\n\n`;
    });
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([md],{type:'text/markdown'}));
  a.download='我的作品库.md'; a.click(); URL.revokeObjectURL(a.href);
}

// 每个用户由画像生成稳定但各异的种子,用来在候选问题中选变体 → 几乎不重样
function attrSeed(a){
  let s = a.wsum*3 + a.n*7 + a.nf*11;
  a.concern.slice(0,4).forEach((x,i)=>{ s += x.s*(i+2)*13; });
  (a.material[0]?[a.material[0]]:[]).forEach(x=> s += x.s*17);
  (a.method[0]?[a.method[0]]:[]).forEach(x=> s += x.s*19);
  return Math.abs(s);
}
function problemText(a){
  const tops = a.concern.slice(0,3);
  if(!tops.length) return '继续刷,你的问题会慢慢浮现。';
  const seed = attrSeed(a);
  const pair = tops.slice(0, tops.length>=2?2:1).map(x=>x.k).join('】与【');
  const head = `你反复被【${pair}】牵动 ——`;
  const qs = tops.map((x,i)=>{
    const b = ATTR.concern.find(c=>c.k===x.k);
    if(!b||!b.q||!b.q.length) return null;
    return '· '+b.q[(seed + i*5) % b.q.length];
  }).filter(Boolean).slice(0,3);
  return head + '<br>' + qs.join('<br>');
}
function computeAttr(){
  const liked = WORKS.filter(w=>lib.has(w.id));
  const textOf = w => w.bg + w.how + w.why + (w.more||'') + w.cat + w.t + (w.verse||'');
  const tally = buckets => buckets.map(b=>{
    let s=0; liked.forEach(w=>{ const t=textOf(w); if(b.kw.some(k=>t.includes(k))) s+= favs.has(w.id)?2:1; }); // 爆灯权重加倍
    return {k:b.k, s};
  }).filter(x=>x.s>0).sort((a,b)=>b.s-a.s);
  const wsum = liked.reduce((a,w)=>a+(favs.has(w.id)?2:1),0);
  return { n:liked.length, nf:favs.size, wsum, concern:tally(ATTR.concern), material:tally(ATTR.material), method:tally(ATTR.method) };
}

    <div class="pfield"><span class="k">累计刷过</span><span class="v">${seen} 张</span></div>
    <div class="pfield"><span class="k">通关</span><span class="v">${rounds} 关</span></div>
    <div class="pfield"><span class="k">当前境界</span><span class="v">${curRank()}</span></div>
    <div class="pdanger"><button id="pReset">重置全部数据…</button></div>`;
  document.getElementById('pEditName').onclick=()=>{
    const n=prompt('给自己起个名字', name==='未命名刷子'?'':name);
    if(n && n.trim()){ localStorage.setItem(LSN, n.trim()); renderInfo(); }
  };
  document.getElementById('pReset').onclick=hardReset;
}
function renderAttr(){
  const box=document.getElementById('pAttr');
  if(rounds<1){
    const done=roundTotal-deck.length;
    box.innerHTML=`<div class="alock"><div class="ico">🔒</div>
      <h4>刷完第 1 关即可解锁</h4>
      <p>个人属性由你库里喜欢的作品自动归纳。<br>先刷完这一关(当前 ${done}/${roundTotal}),<br>它会为你勾出:核心关怀 · 问题意识 · 材料 · 组织方法。</p></div>`;
    return;
  }
  const a=computeAttr();
  if(!a.n){ box.innerHTML=`<div class="alock"><div class="ico">🫙</div><h4>库里还没有作品</h4><p>右滑你觉得有意思的卡片,<br>属性会随之生长。</p></div>`; return; }
  const bars = list => list.length ? list.slice(0,4).map(x=>`
    <div class="abar"><div class="row"><b>${x.k}</b><span>${Math.round(x.s/a.wsum*100)}%</span></div>
    <div class="track"><i style="width:${Math.round(x.s/a.wsum*100)}%"></i></div></div>`).join('') : '<div class="anote">暂无明显偏向</div>';
  const tags = list => list.length ? '<div class="atags">'+list.slice(0,5).map(x=>`<span class="atag">${x.k}<b>${x.s}</b></span>`).join('')+'</div>' : '<div class="anote">暂无明显偏向</div>';
  const q = problemText(a);
  // 一句话画像:关怀 × 材料 × 方法(几乎人人不同)
  const sig = (a.concern[0] && a.material[0] && a.method[0])
    ? `你像是一个用【${a.material[0].k}】、以【${a.method[0].k}】,去追问【${a.concern[0].k}】的人。`
    : '再多刷一些,你的创作气质会更清晰。';
  box.innerHTML=`
    <div class="asig">${sig}</div>
    <div class="asec"><div class="at">核 心 关 怀</div>${bars(a.concern)}</div>
    <div class="asec"><div class="at">问 题 意 识</div><div class="aq">${q}</div></div>
    <div class="asec"><div class="at">材 料</div>${tags(a.material)}</div>
    <div class="asec"><div class="at">组 织 方 法</div>${tags(a.method)}</div>
    <div class="anote">基于库里 ${a.n} 件作品即时归纳${a.nf?`,其中 ${a.nf} 件爆灯按双倍权重计入`:''} · 刷得越多越准</div>`;
}
function hardReset(){
  if(!confirm('⚠️ 重置会清空你的全部数据:作品库、荣誉、闯关进度、个人属性,且无法恢复。\n\n确定要继续吗?')) return;
  if(!confirm('⚠️ 再确认一次。\n你喜欢过的所有作品、所有荣誉都会永久消失。\n建议先去「我的库」导出目录留档。\n\n仍然要清空吗?')) return;
  const t=prompt('最后一步:请输入「清空」二字确认(输入其它任何内容都会取消)。');
  if(t!=='清空'){ alert('已取消,你的数据安然无恙。'); return; }
  judged={}; undoStack=[]; lib.clear(); favs.clear(); passed.clear(); rounds=0; seen=0;
  saveJ(); saveL(); saveF(); saveP(); saveR(); saveS();
  closeOv('person'); buildDeck(); render();
  alert('已全部清空,从第 1 关重新开始。');
}

/* ============ 荣誉墙 ============ */
function openHonor(){
  const big = Math.floor(rounds/5);
  let html = `<div class="hstat">
    <div class="box"><div class="n">${rounds}</div><div class="l">通关数</div></div>
    <div class="box rank"><div class="n">${curRank()}</div><div class="l">当前境界</div></div>
    <div class="box"><div class="n">${big}</div><div class="l">大荣誉</div></div>
  </div>`;
  if(!rounds){ html+='<div class="muted">还没通关任何一关<br>刷完一整轮即可击败第一个心魔</div>'; }
  else{
    html+='<div id="medalGrid">';
    for(let n=rounds;n>=1;n--){
      const isBig = n%5===0;
      html+=`<div class="mcell${isBig?' big':''}">
        <div class="e">${isBig?'🏆':medalOf(n)}</div>
        <div class="lv">第 ${n} 关</div>
        <div class="bn">${isBig?rankOf(n/5):bossOf(n)}</div>
      </div>`;
    }
    html+='</div>';
  }
  document.getElementById('honorWall').innerHTML=html;
  document.getElementById('honor').classList.add('show');
}

/* ============ 全局绑定 ============ */
function closeOv(id){ document.getElementById(id).classList.remove('show'); if(id==='detail') document.getElementById('dAudioBox').innerHTML=''; }
document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>closeOv(b.dataset.close));
document.getElementById('btnLike').onclick=()=>judge('like');
document.getElementById('btnPass').onclick=()=>judge('pass');
document.getElementById('btnFav').onclick=()=>judge('fav');
document.getElementById('btnUndo').onclick=undo;
document.getElementById('btnLib').onclick=openLibrary;
document.getElementById('btnHonor').onclick=openHonor;
document.getElementById('btnPerson').onclick=()=>openPersonal('info');
document.querySelectorAll('.ptab').forEach(b=>b.onclick=()=>switchPtab(b.dataset.tab));
document.getElementById('btnEmptyLib').onclick=openLibrary;
document.getElementById('btnEmptyReset').onclick=hardReset;
document.addEventListener('keydown',e=>{
  if(document.querySelector('.overlay.show')){ if(e.key==='Escape'){closeOv('detail');closeOv('library');closeOv('honor');closeOv('person');} return; }
  if(document.getElementById('victory').classList.contains('show')){ if(e.key==='Enter') document.getElementById('vNext').click(); return; }
  if(e.key==='ArrowRight') judge('like');
  else if(e.key==='ArrowLeft') judge('pass');
  else if(e.key==='ArrowUp') judge('fav');
  else if(e.key==='z') undo();
});

buildDeck(); render();
</script>
</body>
</html>
